<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grupo">
        <header class="cabecalho">
            <h1>Site de Revisão</h1>
            <nav class="menu">
                <a href="#">Início</a>
                <a href="#">Sobre</a>
                <a href="#">Contatos</a>
            </nav>
        </header>
        <div class="conteudo">
            <nav class="navegacao">
                <h2>Menu Lateral</h2>
                <ul>
                    <li>Perfil</li>
                    <li>Configurações</li>
                    <li>Ajuda</li>
                </ul>
            </nav>
            <section class="secao">
                <h2>Painel do Usuário</h2>
                <p>Nome: <span id="nomeUsuario">Theo Augusto</span></p>
                <p>Curso: Desenvolvimento de Sistemas</p>
                <p>Status: Ativo</p>
                <hr>
                <h3>Alterar Nome</h3>
                <div class="formulario">
                    <input type="text" name="inputNome" id="inputNome">
                    <button onclick="alterarNome()">Alterar</button>
                </div>
                <h3>Alterar Curso</h3>
                <div class="formulario">
                    <input type="text" name="inputCurso" id="inputCurso">
                    <button onclick="alterarCurso()">Alterar</button>
                </div>
                <h3>Alterar Status</h3>
                <div class="formulario">
                    <input type="text" name="inputStatus" id="inputStatus">
                    <button onclick="alterarStatus()">Alterar</button>
                </div>
            </section>
        </div>
        <footer class="rodape">
            <p>&copy; Desenvolvido por <strong>Tete</strong></p>
            <div class="redes">
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/2111/2111463.png" alt="Ícone do Instagram">Instagram</a>
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/733/733553.png" alt="Ícone do Github">Github</a>
            </div>
        </footer>
    </div>
    <script src="script.j<s"></script>
</body>
</html>
